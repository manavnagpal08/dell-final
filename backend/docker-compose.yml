version: '3.8'

services:
  api:
    build: .
    ports:
      - "9000:9000"
    volumes:
      - .:/app
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ENVIRONMENT=development
    env_file:
      - .env
    command: uvicorn app.main:app --host 0.0.0.0 --port 9000 --reload
